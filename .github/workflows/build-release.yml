name: Build SafeTrendBot V5

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cython
          pip install -r trading_bot/requirements.txt

      - name: Build .exe
        working-directory: ./trading_bot
        run: |
          python -m PyInstaller main.py --name SafeTrendBot --onefile --windowed ^
            --add-data "app;app" --add-data "bot;bot" ^
            --hidden-import PyQt6.sip ^
            --hidden-import numpy.core._dtype_ctypes ^
            --hidden-import app.core.trading_engine_v4 ^
            --hidden-import app.core.license_manager_v2 ^
            --hidden-import app.core.anti_tamper ^
            --hidden-import app.core.extreme_guard ^
            --hidden-import app.core.encryption ^
            --hidden-import app.core.watermark ^
            --hidden-import app.core.auto_updater ^
            --hidden-import app.core.broadcast_client ^
            --hidden-import app.brokers.mt5_adapter ^
            --hidden-import bot.telegram_alerts ^
            --exclude-module matplotlib.tests ^
            --exclude-module numpy.random._examples

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeTrendBot-Windows
          path: trading_bot/dist/SafeTrendBot.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libgl1
          python -m pip install --upgrade pip
          pip install pyinstaller cython
          pip install -r trading_bot/requirements.txt
      - name: Build
        working-directory: ./trading_bot
        run: |
          python -m PyInstaller main.py --name SafeTrendBot --onefile --windowed \
            --add-data "app:app" --add-data "bot:bot" \
            --hidden-import PyQt6.sip \
            --hidden-import numpy.core._dtype_ctypes \
            --hidden-import app.core.trading_engine_v4 \
            --hidden-import app.core.license_manager_v2 \
            --exclude-module matplotlib.tests \
            --exclude-module numpy.random._examples
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeTrendBot-Linux
          path: trading_bot/dist/SafeTrendBot

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          name: SafeTrendBot ${{ github.ref_name }}
          body: |
            ## SafeTrendBot ${{ github.ref_name }}

            **Build de base** — Utilisez avec `builder.py` pour injecter une licence unique.

            | Plateforme | Fichier |
            |------------|---------|
            | Windows | `SafeTrendBot.exe` |
            | Linux | `SafeTrendBot` |

            **Pour les clients:**
            ```bash
            python builder.py --tier basic --email client@ex.com
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
