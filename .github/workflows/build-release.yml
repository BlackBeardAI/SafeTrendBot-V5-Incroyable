name: Build SafeTrendBot V5

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./trading_bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cython
          pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller SafeTrendBot.spec --clean -y

      - name: Check output
        shell: pwsh
        run: |
          if (Test-Path "dist\SafeTrendBot.exe") {
            $size = (Get-Item "dist\SafeTrendBot.exe").Length / 1MB
            Write-Host "Built: dist\SafeTrendBot.exe ($size MB)"
          } else {
            Write-Host "ERROR: Output file not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeTrendBot-Windows
          path: trading_bot/dist/SafeTrendBot.exe

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./trading_bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libgl1
          python -m pip install --upgrade pip
          pip install pyinstaller cython
          pip install -r requirements.txt
      - name: Build
        run: python -m PyInstaller SafeTrendBot.spec --clean -y
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeTrendBot-Linux
          path: trading_bot/dist/SafeTrendBot

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          name: SafeTrendBot ${{ github.ref_name }}
          body: |
            ## SafeTrendBot ${{ github.ref_name }}

            **Build de base** — Utilisez avec `builder.py` pour injecter une licence unique.

            | Plateforme | Fichier |
            |------------|---------|
            | Windows | `SafeTrendBot.exe` |
            | Linux | `SafeTrendBot` |

            **Pour les clients:**
            ```bash
            python builder.py --tier basic --email client@ex.com
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
